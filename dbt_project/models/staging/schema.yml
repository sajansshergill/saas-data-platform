version: 2

sources:
  - name: public
    tables:
      - name: customers
      - name: subscriptions
      - name: payments
      - name: usage_events

models:
  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: stg_subscriptions
    columns:
      - name: subscription_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null

  - name: stg_payments
    columns:
      - name: payment_id
        tests:
          - not_null
          - unique
      - name: amount
        tests:
          - not_null

  - name: stg_usage_events
    columns:
      - name: event_id
        tests:
          - not_null
          - unique