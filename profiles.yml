# dbt connection profile. Copy to ~/.dbt/profiles.yml or set DBT_PROFILES_DIR=.
# Uses same DB as pipelines (Postgres). Adjust user/password for Docker vs local.
saas_data_platform:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'postgres') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', '') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'saas_platform') }}"
      schema: public
      threads: 4
